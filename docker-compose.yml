services:
  postgresql:
    build: ./postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - postgres-net
    volumes:
      - postgres_data:/var/lib/postgresql/
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    command: >
      postgres -c max_connections=10
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c huge_page_size=2MB
      -c maintenance_work_mem=128MB
      -c archive_mode=off
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale-provider=icu --icu-locale=en"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    secrets:
      - postgres_password

networks:
  postgres-net:
    driver: bridge
    ipam:
      config:
        - subnet: "172.20.0.0/16"

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ./postgres_password.txt
